name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_mysql

      - name: Install backend dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Prepare deployment branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git checkout -b deploy || git checkout deploy

          # Copy React build to public directory for Laravel to serve
          cp -r build/* public/ || echo "No build directory found"

          # Move public files to root for Hostinger deployment
          mv public/index.php ./
          mv public/.htaccess ./
          mv public/favicon.ico ./
         mv public/robots.txt ./

          # Ensure bootstrap/cache exists
          mkdir -p bootstrap/cache
          chmod -R 775 bootstrap/cache

          # Add all required files (vendor is large but needed)
          git add -f vendor/ composer.lock bootstrap/cache || true
          git add -f index.php .htaccess favicon.ico robots.txt public/ app/ bootstrap/ config/ database/ resources/ routes/ storage/ tests/ artisan composer.json || true

          git commit -m "Deploy: Frontend and backend $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/01ejkaguilar-glitch/ArbiterCoffeeHUB.git deploy --force

      - name: Deployment summary
        run: |
          echo "============================================"
          echo "  Deployment completed successfully!"
          echo "============================================"
          echo ""
          echo "Built files pushed to 'deploy' branch."
          echo "Hostinger will automatically deploy from this branch."
          echo ""
          echo "IMPORTANT: After Hostinger deployment completes,"
          echo "visit: https://arbitercoffee.shop/install_composer.php"
          echo "Then DELETE install_composer.php for security!"
          echo ""
          echo "After installation, clear cache with:"
          echo "php artisan config:clear"
          echo "php artisan route:clear"
          echo "php artisan view:clear"
          echo "php artisan cache:clear"
          echo "============================================"
