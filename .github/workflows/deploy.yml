name: Deploy to Hostinger via SFTP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_mysql

      - name: Prepare public_html
        run: |
          rm -rf public_html/api
          mkdir -p public_html/api/{storage/{logs,framework/{cache,sessions,views},bootstrap/cache},api}
          cp -r build/* public_html/

      - name: Copy Laravel files
        run: |
          cp public/index.php artisan composer.json composer.lock .env public_html/api/ 2>/dev/null || cp public/index.php artisan composer.json composer.lock .env.example public_html/api/
          cp -r app config routes bootstrap storage database resources public_html/api/
          cp -r public/.htaccess lang public_html/api/ 2>/dev/null || true
          mkdir -p public_html/api/storage/{logs,framework/{cache,sessions,views}}

      - name: Deploy via SFTP
        run: |
          echo "Files to upload: $(find public_html -type f | wc -l)"
          echo "Total size: $(du -sh public_html | cut -f1)"
          echo "=== Connection Debug ==="
          echo "FTP_HOST set: ${FTP_HOST:+YES}${FTP_HOST:+ (length: ${#FTP_HOST})}"
          echo "FTP_PORT set: ${FTP_PORT:+YES}${FTP_PORT:+ (length: ${#FTP_PORT})}"
          echo "FTP_USERNAME set: ${FTP_USERNAME:+YES}${FTP_USERNAME:+ (length: ${#FTP_USERNAME})}"
          echo "FTP_PASSWORD set: ${FTP_PASSWORD:+YES}${FTP_PASSWORD:+ (length: ${#FTP_PASSWORD})}"

          # Test basic connectivity first
          echo "=== Testing connectivity to port 21 ==="
          nc -zv -w 5 "$FTP_HOST" "$FTP_PORT" 2>&1 || echo "Connection test failed"

          # Install sshpass (more reliable than lftp for password-based SFTP)
          if ! command -v sshpass &> /dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          fi

          echo "=== Uploading via FTP ==="

          # Create batch file using printf (no heredoc in YAML)
          printf 'mkdir /public_html\ncd /public_html\nmput public_html/*\nbye\n' > /tmp/ftp_batch.txt

          # Use ncftp for reliable FTP upload (works with port 21)
          if ! command -v ncftpput &> /dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq ncftp
          fi

          # Try ncftp with explicit port (-P for port, -u for user, -p for password)
          ncftpput -vv -R -m -T 300 -u "$FTP_USERNAME" -p "$FTP_PASSWORD" -P "$FTP_PORT" "$FTP_HOST" "/public_html" public_html

          echo "Upload complete!"
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
