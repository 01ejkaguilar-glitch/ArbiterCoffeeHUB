name: Deploy to Hostinger via SFTP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_mysql

      - name: Prepare public_html
        run: |
          rm -rf public_html/api
          mkdir -p public_html/api/{storage/{logs,framework/{cache,sessions,views},bootstrap/cache},api}
          cp -r build/* public_html/

      - name: Copy Laravel files
        run: |
          cp public/index.php artisan composer.json composer.lock .env public_html/api/ 2>/dev/null || cp public/index.php artisan composer.json composer.lock .env.example public_html/api/
          cp -r app config routes bootstrap storage database resources public_html/api/
          cp -r public/.htaccess lang public_html/api/ 2>/dev/null || true
          mkdir -p public_html/api/storage/{logs,framework/{cache,sessions,views}}

      - name: Deploy via SFTP
        run: |
          echo "Files to upload: $(find public_html -type f | wc -l)"
          echo "Total size: $(du -sh public_html | cut -f1)"

          # Install lftp if needed (use sudo for GitHub Actions)
          if ! command -v lftp &> /dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          fi

          echo "=== Uploading via SFTP ==="

          # Upload using lftp with inline commands
          lftp -c "set sftp:connect-timeout 20; set net:timeout 20; set mirror:parallel 5; open -u $FTP_USERNAME,$FTP_PASSWORD sftp://$FTP_HOST:$FTP_PORT; mirror -R public_html /public_html --verbose" && echo "Upload complete!" || { echo "Upload failed"; exit 1; }
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
