name: Deploy to Hostinger via FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_mysql

      - name: Prepare public_html
        run: |
          rm -rf public_html/api
          mkdir -p public_html/api/{storage/{logs,framework/{cache,sessions,views},bootstrap/cache},api}
          cp -r build/* public_html/
          # Ensure .htaccess exists for React SPA routing
          if [ ! -f public_html/.htaccess ]; then cp build/.htaccess public_html/.htaccess; fi

      - name: Copy Laravel files
        run: |
          cp public/index.php artisan composer.json composer.lock .env public_html/api/ 2>/dev/null || cp public/index.php artisan composer.json composer.lock .env.example public_html/api/
          cp -r app config routes bootstrap storage database resources public_html/api/
          cp -r public/.htaccess lang public_html/api/ 2>/dev/null || true
          mkdir -p public_html/api/storage/{logs,framework/{cache,sessions,views}}
          mkdir -p public_html/api/bootstrap/cache

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./public_html/
          exclude: |
            **/vendor/**
            **/.git/**
            **/.ftp-deploy-sync-state.json

      - name: Setup SSH keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Run deploy commands via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/u843463747/domains/arbitercoffee.shop/public_html/api
            # Check vendor status
            echo "=== Checking vendor directory ==="
            ls -la vendor/ | head -10
            # Install composer dependencies if needed
            if [ ! -d "vendor/laravel/sanctum" ]; then
              echo "=== Running composer install ==="
              composer install --no-dev --optimize-autoloader --prefer-dist
            else
              echo "=== Vendor already exists ==="
            fi
            # Check if .env exists
            echo "=== Checking .env ==="
            ls -la .env
            # Test DB connection
            echo "=== Testing DB connection ==="
            php artisan tinker --execute="DB::connection()->getPdo(); echo 'DB OK';"
            # Show recent Laravel log errors (full)
            echo "=== Full Laravel log (last 100 lines) ==="
            tail -100 storage/logs/laravel.log 2>/dev/null || echo "No log file"
            # Check for PHP errors in standard log location
            echo "=== PHP error log ==="
            tail -50 /home/u843463747/domains/arbitercoffee.shop/error_log 2>/dev/null || echo "No PHP error log found"
            # Test authenticated endpoint with verbose error
            echo "=== Testing auth:sanctum middleware ==="
            php artisan tinker --execute="try { \$user = App\\Models\\User::first(); echo 'User count: ' . App\\Models\\User::count() . PHP_EOL; echo 'Sanctum token count: ' . App\\Models\\User::first()?->tokens->count() . PHP_EOL; } catch (Exception \$e) { echo 'ERROR: ' . \$e->getMessage() . PHP_EOL; }"
            # Clear and rebuild caches
            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear
            # Force clear everything including compiled
            php artisan clear-compiled 2>/dev/null || true
            # Set proper permissions
            chmod -R 755 storage bootstrap/cache
            # Verify PHP/Artisan works
            php artisan --version
