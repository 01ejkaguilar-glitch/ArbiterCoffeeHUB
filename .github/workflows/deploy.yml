name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # === Frontend Build ===
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      # === Backend Setup ===
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, pdo_mysql

      - name: Install backend dependencies
        run: composer install --no-dev --optimize-autoloader

      # === Deploy Frontend ===
      - name: Deploy frontend to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: build/
          server-dir: ./build/

      # === Deploy Backend ===
      - name: Deploy backend to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/frontend/**
            **/.git/**
            **/storage/**
            **/.env*
            **/tests/**
            **/phpunit.xml
            **/docs/**
            **/scripts/**
            **/build/**
            **/.vscode/**
            **/.gitignore.backend**
            **/sync_config.jsonc**
            **/.hintrc**
            **/DEPLOYMENT.md**
            **/vendor/**
            **/deploy.sh**
          timeout: 600000

      # === Deploy Public Files ===
      - name: Deploy public files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: public/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**

      # === Post-Deployment Instructions ===
      - name: Post-deployment instructions
        run: |
          echo "=========================================="
          echo "Deployment completed successfully!"
          echo "=========================================="
          echo ""
          echo "IMPORTANT: You need to run these commands on your Hostinger server via SSH:"
          echo ""
          echo "cd public_html"
          echo "composer install --no-dev --optimize-autoloader"
          echo "php artisan cache:clear"
          echo "php artisan config:clear"
          echo "php artisan route:clear"
          echo "php artisan view:clear"
          echo ""
          echo "Or upload and run the deploy.sh script:"
          echo "chmod +x deploy.sh"
          echo "./deploy.sh"
          echo ""
          echo "=========================================="
