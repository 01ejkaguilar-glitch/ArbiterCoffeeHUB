name: Build and Prepare for Hostinger Git Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_mysql

      - name: Install backend dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Ensure bootstrap/cache directory exists and is writable
        run: |
          mkdir -p bootstrap/cache
          chmod -R 777 bootstrap/cache
          # Also ensure the packages.php file is writable if it exists
          if [ -f bootstrap/cache/packages.php ]; then
            chmod 666 bootstrap/cache/packages.php
          fi

      - name: Generate Laravel cache files
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:clear || true

      - name: Prepare deployment branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Create fresh deploy branch from main (reset if exists)
          git checkout -B deploy main

          # Copy React build to public directory for Laravel to serve
          cp -r build/* public/ || echo "No build directory found"

          # Copy React's .htaccess (for SPA routing) to override Laravel's .htaccess
          cp frontend/public/.htaccess public/.htaccess
          # Add DirectoryIndex for LiteSpeed server
          echo "DirectoryIndex index.html" | cat - public/.htaccess > temp.htaccess && mv temp.htaccess public/.htaccess

          # Move public files to root for Hostinger deployment
          # Move both index.php (Laravel API) and index.html (React) to root
          mv public/index.php ./
          mv public/index.html ./
          mv public/.htaccess ./
          mv public/favicon.ico ./
          mv public/robots.txt ./
          mv public/static ./ 2>/dev/null || true
          mv public/assets ./ 2>/dev/null || true
          mv public/manifest.json ./ 2>/dev/null || true
          mv public/service-worker.js ./ 2>/dev/null || true

          # Ensure bootstrap/cache is included
          mkdir -p bootstrap/cache
          chmod -R 775 bootstrap/cache

          # Force add built files (ignoring .gitignore)
          git add -f vendor/ || echo "No vendor directory found"
          git add -f bootstrap/cache/ || echo "No bootstrap/cache directory found"
          git add composer.lock || echo "No composer.lock found"

          # Add moved public files
          git add index.php .htaccess favicon.ico robots.txt || echo "No public files found"

          # Commit changes
          git commit -m "Build: Frontend and backend dependencies $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"

          # Delete remote deploy branch first to prevent divergent branches error
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/01ejkaguilar-glitch/ArbiterCoffeeHUB.git --delete deploy || echo "No existing deploy branch to delete"

          # Force push to deploy branch using GITHUB_TOKEN
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/01ejkaguilar-glitch/ArbiterCoffeeHUB.git deploy --force

      - name: Deployment instructions
        run: |
          echo "Build completed successfully!"
          echo "Built files have been pushed to the 'deploy' branch."
          echo "Hostinger Git Integration will automatically deploy from this branch."
          echo ""
          echo "Next steps:"
          echo "1. Set up Hostinger Git Integration to use the 'deploy' branch"
          echo "2. Configure deployment path to 'public_html/'"
          echo "3. Enable automatic deployment on push"
          echo ""
          echo "After deployment, visit: https://arbitercoffee.shop/install_composer.php"
          echo "Remember to DELETE install_composer.php after installation!"
