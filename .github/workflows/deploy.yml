name: Deploy to Hostinger via SFTP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_mysql

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Prepare public_html
        run: |
          rm -rf public_html/api
          mkdir -p public_html/api
          mkdir -p public_html/api/storage/logs
          mkdir -p public_html/api/storage/framework/cache
          mkdir -p public_html/api/storage/framework/sessions
          mkdir -p public_html/api/storage/framework/views
          mkdir -p public_html/api/bootstrap/cache
          cp -r build/* public_html/

      - name: Copy Laravel files
        run: |
          cp public/index.php public_html/api/
          cp -r app public_html/api/
          cp -r config public_html/api/
          cp -r routes public_html/api/
          cp -r bootstrap public_html/api/
          cp -r storage public_html/api/
          cp -r database public_html/api/
          cp -r resources public_html/api/
          cp -r lang public_html/api/ 2>/dev/null || true
          cp artisan public_html/api/
          cp composer.json public_html/api/
          cp composer.lock public_html/api/
          cp .env public_html/api/ 2>/dev/null || cp .env.example public_html/api/.env
          cp -r public/.htaccess public_html/api/ 2>/dev/null || true
          mkdir -p public_html/api/storage
          mkdir -p public_html/api/storage/logs
          mkdir -p public_html/api/storage/framework/cache
          mkdir -p public_html/api/storage/framework/sessions
          mkdir -p public_html/api/storage/framework/views

      - name: Deploy via SFTP
        run: |
          # Check if sshpass is already installed
          if command -v sshpass &> /dev/null; then
            echo "sshpass already installed"
          else
            echo "Installing sshpass..."
            sudo apt-get update
            sudo apt-get install -y sshpass
          fi

          # Debug: show what files exist
          echo "=== Files to deploy ==="
          ls -la public_html/
          echo "=== Checking subdirectories ==="
          find public_html -type f 2>&1 | head -20

          # Deploy using scp with sshpass (recursive copy)
          sshpass -p "${{ secrets.FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 -P ${{ secrets.FTP_PORT }} -r public_html/* ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}:/public_html/
