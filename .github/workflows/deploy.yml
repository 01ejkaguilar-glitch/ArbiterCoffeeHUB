name: Deploy to Hostinger via SFTP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      frontend-hash: ${{ steps.cache-hash.outputs.frontend-hash }}
      backend-hash: ${{ steps.cache-hash.outputs.backend-hash }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute cache hashes
        id: cache-hash
        run: |
          echo "frontend-hash=${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}" >> $GITHUB_OUTPUT
          echo "backend-hash=${{ hashFiles('composer.json', 'composer.lock', '.env*') }}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-npm-${{ steps.cache-hash.outputs.frontend-hash }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 1

  prepare-backend:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_mysql

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Prepare public_html folder structure
        run: |
          mkdir -p public_html/api/storage/logs
          mkdir -p public_html/api/storage/framework/cache
          mkdir -p public_html/api/storage/framework/sessions
          mkdir -p public_html/api/storage/framework/views
          mkdir -p public_html/api/bootstrap/cache
          mkdir -p public_html/api/storage
          mkdir -p public_html/api/storage/logs
          mkdir -p public_html/api/storage/framework/cache
          mkdir -p public_html/api/storage/framework/sessions
          mkdir -p public_html/api/storage/framework/views

      - name: Download and extract frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public_html/

      - name: Copy Laravel files (minimal set)
        run: |
          cp public/index.php public_html/api/
          cp -r app public_html/api/
          cp -r config public_html/api/
          cp -r routes public_html/api/
          cp -r bootstrap public_html/api/
          cp -r storage public_html/api/
          cp -r database public_html/api/
          cp -r resources public_html/api/
          cp -r lang public_html/api/ 2>/dev/null || true
          cp artisan public_html/api/
          cp composer.json public_html/api/
          cp composer.lock public_html/api/
          cp .env public_html/api/ 2>/dev/null || cp .env.example public_html/api/.env
          cp -r public/.htaccess public_html/api/ 2>/dev/null || true

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-files
          path: public_html/api
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: [build, prepare-backend]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: public_html

      - name: Deploy via SFTP
        uses: wangyucode/sftp-deploy@master
        with:
          host: ${{ secrets.FTP_HOST }}
          port: ${{ secrets.FTP_PORT }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_dir: public_html
          remote_dir: /public_html
          exclude: |
            **/node_modules/**
            **/.git/**
            **/vendor/**
            **/.env*
          force-delete: true
          sftp: true
