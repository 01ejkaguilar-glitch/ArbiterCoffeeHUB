name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # === Frontend Build ===
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      # === Backend Setup ===
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, pdo_mysql

      - name: Install backend dependencies
        run: composer install --no-dev --optimize-autoloader

      # === Deploy Frontend ===
      - name: Deploy frontend to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: build/
          server-dir: ./build/

      # === Deploy Backend Directories ===
      - name: Deploy app/ directory
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: app/
          server-dir: ./app/
          timeout: 300000

      - name: Deploy bootstrap/ directory
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: bootstrap/
          server-dir: ./bootstrap/
          timeout: 300000

      - name: Deploy config/ directory
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: config/
          server-dir: ./config/
          timeout: 300000

      - name: Deploy database/ directory
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: database/
          server-dir: ./database/
          timeout: 300000

      - name: Deploy resources/ directory
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: resources/
          server-dir: ./resources/
          timeout: 300000

      - name: Deploy routes/ directory
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: routes/
          server-dir: ./routes/
          timeout: 300000

      - name: Deploy root files (artisan, composer files, index.php)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          exclude: |
            app/**
            bootstrap/**
            build/**
            config/**
            database/**
            frontend/**
            node_modules/**
            public/**
            resources/**
            routes/**
            storage/**
            tests/**
            vendor/**
            .git/**
            .github/**
            .vscode/**
            docs/**
            scripts/**
            .env*
            .hintrc
            .gitignore*
            sync_config.jsonc
            phpunit.xml
            *.md
            pint.json
            phpstan.neon
          timeout: 120000

      # === Deploy Public Files ===
      - name: Deploy public files to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: public/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
          timeout: 300000

      # === Deploy Installation Script ===
      - name: Deploy installation script to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          exclude: |
            **/*
            !install_composer.php
          timeout: 120000
          security: private

      # === Post-Deployment Instructions ===
      - name: Post-deployment instructions
        run: |
          echo "=========================================="
          echo "Deployment completed successfully!"
          echo "=========================================="
          echo ""
          echo "IMPORTANT: You need to install composer dependencies manually."
          echo ""
          echo "EASIEST METHOD - Use the PHP script:"
          echo "1. Access: https://yourdomain.com/install_composer.php"
          echo "2. Wait for installation to complete"
          echo "3. DELETE the install_composer.php file from your server!"
          echo ""
          echo "ALTERNATIVE METHODS:"
          echo "1. Via Hostinger Control Panel -> File Manager -> Terminal:"
          echo "   composer install --no-dev --optimize-autoloader"
          echo ""
          echo "2. Via Hostinger's PHP Composer tool in control panel"
          echo ""
          echo "After installation, clear cache:"
          echo "php artisan cache:clear"
          echo "php artisan config:clear"
          echo "php artisan route:clear"
          echo "php artisan view:clear"
          echo ""
          echo "=========================================="
