name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_mysql

      - name: Install backend dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Deploy frontend to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: build/
          server-dir: public_html/build/
          timeout: 1800000

      - name: Deploy backend to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: public_html/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/frontend/**
            **/storage/**
            **/.env*
            **/tests/**
            **/phpunit.xml
            **/docs/**
            **/scripts/**
            **/build/**
            **/.vscode/**
            **/.gitignore.backend
            **/sync_config.jsonc
            **/.hintrc
            **/DEPLOYMENT.md
            **/DEPLOYMENT_ANALYSIS.md
            **/HOSTINGER_STRUCTURE_VERIFICATION.md
            **/vendor/**
            deploy.sh
            **/public/**
            install_composer.php
          timeout: 1800000

      - name: Deploy public files to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: public/
          server-dir: public_html/
          exclude: |
            **/.git*
            **/.git*/**
          timeout: 900000

      - name: Deploy install_composer.php to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: public_html/
          files: install_composer.php
          timeout: 300000

      - name: Post-deployment instructions
        run: |
          echo "Deployment completed successfully!"
          echo "Install composer dependencies by visiting: https://arbitercoffee.shop/install_composer.php"
          echo "After installation, DELETE the install_composer.php file from the server!"
