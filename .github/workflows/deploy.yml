name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # === Frontend Build ===
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      # === Backend Setup ===
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, pdo_mysql

      - name: Install backend dependencies
        run: composer install --no-dev --optimize-autoloader

      # === Deploy Frontend ===
      - name: Deploy frontend to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: build/
          server-dir: ./public_html/build/

      # === Deploy Backend Core Files ===
      - name: Deploy backend core files to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./public_html/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/frontend/**
            **/.git/**
            **/storage/**
            **/.env*
            **/tests/**
            **/phpunit.xml
            **/docs/**
            **/scripts/**
            **/build/**
            **/.vscode/**
            **/.gitignore.backend**
            **/sync_config.jsonc**
            **/.hintrc**
            **/DEPLOYMENT.md**
            **/vendor/**
            **/deploy.sh**
            **/public/**
          timeout: 600000

      # === Deploy Public Files ===
      - name: Deploy public files to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: public/
          server-dir: ./public_html/public/
          exclude: |
            **/.git*
            **/.git*/**
          timeout: 300000

      # === Deploy Installation Script ===
      - name: Deploy installation script to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./public_html/
          exclude: |
            **/*
            !install_composer.php
          timeout: 120000

      # === Post-Deployment Instructions ===
      - name: Post-deployment instructions
        run: |
          echo "=========================================="
          echo "Deployment completed successfully!"
          echo "=========================================="
          echo ""
          echo "IMPORTANT: You need to install composer dependencies manually."
          echo ""
          echo "EASIEST METHOD - Use the PHP script:"
          echo "1. Access: https://yourdomain.com/install_composer.php"
          echo "2. Wait for installation to complete"
          echo "3. DELETE the install_composer.php file from your server!"
          echo ""
          echo "ALTERNATIVE METHODS:"
          echo "1. Via Hostinger Control Panel -> File Manager -> Terminal:"
          echo "   composer install --no-dev --optimize-autoloader"
          echo ""
          echo "2. Via Hostinger's PHP Composer tool in control panel"
          echo ""
          echo "After installation, clear cache:"
          echo "php artisan cache:clear"
          echo "php artisan config:clear"
          echo "php artisan route:clear"
          echo "php artisan view:clear"
          echo ""
          echo "=========================================="
