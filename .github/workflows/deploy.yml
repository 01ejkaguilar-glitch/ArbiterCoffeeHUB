name: Deploy to Hostinger via SFTP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_mysql

      - name: Prepare public_html
        run: |
          rm -rf public_html/api
          mkdir -p public_html/api/{storage/{logs,framework/{cache,sessions,views},bootstrap/cache},api}
          cp -r build/* public_html/

      - name: Copy Laravel files
        run: |
          cp public/index.php artisan composer.json composer.lock .env public_html/api/ 2>/dev/null || cp public/index.php artisan composer.json composer.lock .env.example public_html/api/
          cp -r app config routes bootstrap storage database resources public_html/api/
          cp -r public/.htaccess lang public_html/api/ 2>/dev/null || true
          mkdir -p public_html/api/storage/{logs,framework/{cache,sessions,views}}

      - name: Deploy via SFTP
        run: |
          # Verify files exist before upload
          echo "=== Pre-upload verification ==="
          echo "Files in public_html: $(find public_html -type f | wc -l)"
          echo "Total size: $(du -sh public_html | cut -f1)"

          # Only install lftp if not present (skip slow apt-get update)
          if ! command -v lftp &> /dev/null; then
            echo "Installing lftp..."
            sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          else
            echo "lftp already installed"
          fi

          # Upload using lftp with SFTP - parallel transfers for speed
          echo "=== Connecting to SFTP server ==="
          echo "Host: ${{ secrets.FTP_HOST }}:${{ secrets.FTP_PORT }}"

          # FIRST: List remote directory to understand path structure
          echo "=== Checking remote directory structure ==="
          lftp -c "set sftp:connect-timeout 30; open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} sftp://${{ secrets.FTP_HOST }}:${{ secrets.FTP_PORT }}; ls -la /; ls -la public_html/ 2>/dev/null || echo 'public_html not found at /'" 2>&1 || true

          # Run lftp and capture actual exit code
          set -o pipefail
          timeout 300 lftp -e "
            set sftp:connect-timeout 30;
            set net:timeout 30;
            set net:max-retries 3;
            set xfer:log yes;
            mirror -R --parallel=10 --verbose public_html/ /public_html/;
            bye;
          " -u \"${{ secrets.FTP_USERNAME }}\",\"${{ secrets.FTP_PASSWORD }}\" \"sftp://${{ secrets.FTP_HOST }}:${{ secrets.FTP_PORT }}\" 2>&1 | tee lftp_output.txt

          LFTP_EXIT=$?
          echo "=== lftp exit code: $LFTP_EXIT ==="

          # POST: List remote to verify upload
          echo "=== Post-upload remote check ==="
          lftp -c "set sftp:connect-timeout 30; open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} sftp://${{ secrets.FTP_HOST }}:${{ secrets.FTP_PORT }}; ls -la public_html/ | head -20" 2>&1 || true

          if [ $LFTP_EXIT -ne 0 ]; then
            echo "ERROR: lftp failed with exit code $LFTP_EXIT"
            cat lftp_output.txt
            exit 1
          fi

          echo "Upload completed successfully!"
