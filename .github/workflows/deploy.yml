name: Build and Prepare for Hostinger Git Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_mysql

      - name: Install backend dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Prepare deployment branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Create deploy branch from main
          git checkout -b deploy

          # Add built files
          git add build/
          git add vendor/
          git add composer.lock

          # Commit changes
          git commit -m "Build: Frontend and backend dependencies $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"

          # Force push to deploy branch
          git push origin deploy --force

      - name: Deployment instructions
        run: |
          echo "Build completed successfully!"
          echo "Built files have been pushed to the 'deploy' branch."
          echo "Hostinger Git Integration will automatically deploy from this branch."
          echo ""
          echo "Next steps:"
          echo "1. Set up Hostinger Git Integration to use the 'deploy' branch"
          echo "2. Configure deployment path to 'public_html/'"
          echo "3. Enable automatic deployment on push"
          echo ""
          echo "After deployment, visit: https://arbitercoffee.shop/install_composer.php"
          echo "Remember to DELETE install_composer.php after installation!"
