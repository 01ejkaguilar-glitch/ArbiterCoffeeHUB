name: Deploy to Hostinger via SSH

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_mysql

      - name: Install backend dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Generate Laravel cache files
        run: |
          mkdir -p bootstrap/cache
          chmod -R 777 bootstrap/cache
          php artisan config:cache
          php artisan route:cache
          php artisan view:clear || true

      - name: Prepare public_html folder (React + API)
        run: |
          # Remove old api folder if exists (fresh start)
          rm -rf public_html/api

          # Create fresh api directory for Laravel
          mkdir -p public_html/api
          mkdir -p public_html/api/storage/logs
          mkdir -p public_html/api/storage/framework/cache
          mkdir -p public_html/api/storage/framework/sessions
          mkdir -p public_html/api/storage/framework/views
          mkdir -p public_html/api/bootstrap/cache

          # Copy React build to public_html
          cp -r build/* public_html/

      - name: Copy Laravel to public_html/api
        run: |
          # Copy Laravel files to api folder
          cp public/index.php public_html/api/
          cp -r app public_html/api/
          cp -r config public_html/api/
          cp -r routes public_html/api/
          cp -r vendor public_html/api/
          cp -r bootstrap public_html/api/
          cp -r storage public_html/api/
          cp -r database public_html/api/
          cp -r resources public_html/api/
          cp -r lang public_html/api/ 2>/dev/null || true
          cp artisan public_html/api/
          cp composer.json public_html/api/
          cp composer.lock public_html/api/
          cp .env public_html/api/ 2>/dev/null || cp .env.example public_html/api/.env
          cp -r public/.htaccess public_html/api/ 2>/dev/null || true

          # Create storage symlink or copy
          mkdir -p public_html/api/storage
          mkdir -p public_html/api/storage/logs
          mkdir -p public_html/api/storage/framework/cache
          mkdir -p public_html/api/storage/framework/sessions
          mkdir -p public_html/api/storage/framework/views

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server via SSH
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "public_html/"
          target: "/home/u843463747/arbitercoffee.shop/public_html"
          strip_components: 0
          overwrite: true

      - name: Set permissions via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/u843463747/arbitercoffee.shop
            chmod -R 755 public_html/api/bootstrap/cache
            chmod -R 755 public_html/api/storage
            chmod -R 775 public_html/api/storage/logs
            chmod -R 775 public_html/api/storage/framework/cache
            chmod -R 775 public_html/api/storage/framework/sessions
            chmod -R 775 public_html/api/storage/framework/views
            echo "Deployment complete!"
